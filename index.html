<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite 16 Anos - Júlia</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="family">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0d0f12;
            color: #e0e6ed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container principal em tela cheia no mobile */
        .invite-card {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: linear-gradient(135deg, #13171c 0%, #0d0f12 100%);
            border: 2px solid #c5a880;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Detalhes decorativos sutil de linhas douradas */
        .invite-card::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px solid rgba(197, 168, 128, 0.2);
            pointer-events: none;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            color: #c5a880;
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        header .subtitle {
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #8892b0;
            margin-bottom: 25px;
        }

        .details-section {
            margin: 30px 0;
        }

        .celebration-text {
            font-size: 1.2rem;
            color: #ffffff;
            margin-bottom: 35px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 35px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(197, 168, 128, 0.1);
            padding: 15px;
            border-radius: 4px;
        }

        .info-item h3 {
            font-family: 'Cinzel', serif;
            color: #c5a880;
            font-size: 1rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .info-item p {
            font-size: 1.1rem;
            color: #ffffff;
        }

        /* Botões Interativos */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #c5a880;
            color: #0d0f12;
            border: none;
        }

        .btn-primary:hover {
            background-color: #dfc49f;
            box-shadow: 0 0 15px rgba(197, 168, 128, 0.4);
        }

        .btn-secondary {
            background-color: transparent;
            color: #c5a880;
            border: 1px solid #c5a880;
        }

        .btn-secondary:hover {
            background: rgba(197, 168, 128, 0.1);
        }

        footer {
            font-size: 0.8rem;
            color: #8892b0;
            margin-top: 25px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="invite-card">
        <header>
            <h1>Júlia Silva</h1>
            <p class="subtitle">de Oliveira Beco</p>
        </header>

        <div class="details-section">
            <p class="celebration-text">✨ Celebração de 16 Anos ✨</p>
            
            <div class="info-grid">
                <div class="info-item">
                    <h3>Data</h3>
                    <p>30 de Maio de 2026</p>
                </div>
                <div class="info-item">
                    <h3>Horário</h3>
                    <p>19:00 Horas</p>
                </div>
                <div class="info-item">
                    <h3>Local</h3>
                    <p>Banana Sushi — Ceilândia</p>
                </div>
                <div class="info-item">
                    <h3>Traje</h3>
                    <p>Casual Elegante / Esporte Fino</p>
                </div>
            </div>
        </div>

        <div class="actions">
            <a href="https://maps.google.com/?q=Banana+Sushi+Ceilandia" target="_blank" class="btn btn-primary">📍 Como Chegar (Localização)</a>
            
            <button onclick="confirmarPresenca()" class="btn btn-secondary">💌 Confirmar Presença</button>
        </div>

        <footer>
            <p>Conto com a sua presença para celebrarmos juntos!</p>
        </footer>
    </div>

    <script>
        function confirmarPresenca() {
            // Substitua pelo número de telefone correto que receberá as confirmações
            const telefone = "5561999999999"; 
            const mensagem = encodeURIComponent("Olá Júlia! Confirmo com muita alegria a minha presença no seu aniversário de 16 anos no Banana Sushi!");
            window.open(`https://api.whatsapp.com/send?phone=${telefone}&text=${mensagem}`, '_blank');
        }
    </script>

</body>
</html>
